<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="/favicon-32x32.png"
        />
        <link
            rel="icon"
            type="image/png"
            sizes="16x16"
            href="/favicon-16x16.png"
        />
        <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
        <link rel="shortcut icon" href="/favicon.ico" />
        <link rel="manifest" href="/manifest.json" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#171513" />
        <meta name="color-scheme" content="dark" />

        <!--
          SEO metadata (title, description, canonical, Open Graph, Twitter
          Card, JSON-LD structured data) is injected per-route by the <SEO />
          component via react-helmet-async. At build time, the prerender
          script (scripts/prerender.mjs) renders each route to static HTML
          and injects the complete metadata into the <head>.

          The minimal <title> and <meta name="description"> below serve as
          fallbacks ONLY for the SPA 404 route (which is not prerendered).
          For prerendered routes (/ and /projects/pyrope), react-helmet-async
          overwrites these at build time.
        -->

        <!-- Resource hints: preconnect to external origins -->
        <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />
        <link rel="dns-prefetch" href="https://res.cloudinary.com" />

        <!--
          Font loading strategy:
          Fonts are loaded via @fontsource imports in main.tsx, which emit
          @font-face rules with `font-display: swap` and reference bundled
          .woff2 files. Vite hashes these filenames at build time, so we
          do NOT <link rel="preload"> them statically — a static preload URL
          would never match the hashed @font-face URL and would trigger a
          "preloaded resource not used" console warning.

          We rely on @fontsource's `font-display: swap` to show text
          immediately with a system fallback, then swap to the real font
          once it arrives. For the LCP element (hero h1), the inline <style>
          below sets the font-family stack with system-ui as the immediate
          fallback so the heading paints instantly on first render, then
          refines to Space Grotesk once the @fontsource CSS loads.
        -->

        <!-- Fallback title/description for the non-prerendered 404 route -->
        <title>Nirvik Dhungana — Frontend Developer</title>
        <meta
            name="description"
            content="Portfolio of Nirvik Dhungana — a frontend developer building accessible, responsive interfaces with React, TypeScript, and Tailwind CSS."
        />
        <meta name="robots" content="index, follow, max-image-preview:large" />
        <meta name="author" content="Nirvik Dhungana" />

        <!-- Critical CSS for above-the-fold (hero section + base theme tokens).
             Inlined to eliminate render-blocking request for the LCP element.
             NOTE: No @font-face declarations here — @fontsource owns them.
             We only inline the CSS variables, base body styling, and the
             utility classes used by the hero so the first paint is correct
             even before the main CSS bundle arrives. -->
        <style>
            /* Pyrope design tokens — inlined for instant first paint */
            :root {
                --color-bg-base: #171513;
                --color-bg-1: #1e1b19;
                --color-bg-2: #282420;
                --color-bg-3: #3a3430;
                --color-fg: #e6ddd0;
                --color-fg-dim: #9c9186;
                --color-fg-faint: #8a7f75;
                --color-fg-bright: #f0e9dd;
                --color-accent: #a8c155;
                --font-sans: "Inter", ui-sans-serif, system-ui, sans-serif;
                --font-mono: "JetBrains Mono", ui-monospace, monospace;
                --font-display: "Space Grotesk", "Inter", system-ui, sans-serif;
            }
            html {
                scroll-padding-top: 6rem;
                scroll-behavior: smooth;
            }
            body {
                margin: 0;
                background-color: var(--color-bg-base);
                color: var(--color-fg);
                font-family: var(--font-sans);
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
                overflow-x: hidden;
            }
            .font-display { font-family: var(--font-display); }
            .text-fg-bright { color: var(--color-fg-bright); }
            .text-accent { color: var(--color-accent); }
            .text-fg-dim { color: var(--color-fg-dim); }
            #root { min-height: 100vh; }
        </style>
    </head>
    <body>
        <div id="root"></div>
        <noscript>
            Nirvik Dhungana — Frontend Developer. The portfolio content below
            is fully readable without JavaScript. Enabling JavaScript unlocks
            interactive navigation, animations, and the project detail views.
        </noscript>
        <!-- Main bundle — Vite injects type="module" automatically (deferred by default) -->
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
