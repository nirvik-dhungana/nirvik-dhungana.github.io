<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="/favicon-32x32.png"
        />
        <link
            rel="icon"
            type="image/png"
            sizes="16x16"
            href="/favicon-16x16.png"
        />
        <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
        <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#a8c155" />
        <link rel="shortcut icon" href="/favicon.ico" />
        <link rel="manifest" href="/manifest.json" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#171513" />
        <meta name="color-scheme" content="dark" />

        <!--
          SEO metadata (title, description, canonical, Open Graph, Twitter
          Card, JSON-LD structured data) is injected per-route by the <SEO />
          component via react-helmet-async. At build time, the prerender
          script (scripts/prerender.mjs) renders each route to static HTML
          and injects the complete metadata into the <head>.

          The minimal <title> and <meta name="description"> below serve as
          fallbacks ONLY for the SPA 404 route (which is not prerendered).
          For prerendered routes (/ and /projects/pyrope), react-helmet-async
          overwrites these at build time.
        -->

        <!-- Resource hints: preconnect to external origins -->
        <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />
        <link rel="dns-prefetch" href="https://res.cloudinary.com" />

        <!-- Preload critical fonts for LCP (Space Grotesk 700 = Pyrope h1, Inter 400 = body) -->
        <link
            rel="preload"
            href="/fonts/space-grotesk-latin-700.woff2"
            as="font"
            type="font/woff2"
            crossorigin
        />
        <link
            rel="preload"
            href="/fonts/inter-latin-400.woff2"
            as="font"
            type="font/woff2"
            crossorigin
        />

        <!-- Fallback title/description for the non-prerendered 404 route -->
        <title>Nirvik Dhungana — Frontend Developer</title>
        <meta
            name="description"
            content="Portfolio of Nirvik Dhungana — a frontend developer building accessible, responsive interfaces with React, TypeScript, and Tailwind CSS."
        />
        <meta name="robots" content="index, follow, max-image-preview:large" />
        <meta name="author" content="Nirvik Dhungana" />

        <!-- Critical CSS for above-the-fold (hero section + base theme tokens).
             Inlined to eliminate render-blocking request for the LCP element. -->
        <style>
            /* Pyrope design tokens — inlined for instant first paint */
            :root {
                --color-bg-base: #171513;
                --color-bg-1: #1e1b19;
                --color-bg-2: #282420;
                --color-bg-3: #3a3430;
                --color-fg: #e6ddd0;
                --color-fg-dim: #9c9186;
                --color-fg-faint: #6b625a;
                --color-fg-bright: #f0e9dd;
                --color-accent: #a8c155;
                --font-sans: "Inter", ui-sans-serif, system-ui, sans-serif;
                --font-mono: "JetBrains Mono", ui-monospace, monospace;
                --font-display: "Space Grotesk", "Inter", sans-serif;
            }
            html {
                scroll-padding-top: 6rem;
                scroll-behavior: smooth;
            }
            body {
                margin: 0;
                background-color: var(--color-bg-base);
                color: var(--color-fg);
                font-family: var(--font-sans);
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
                overflow-x: hidden;
            }
            @font-face {
                font-family: "Space Grotesk";
                font-style: normal;
                font-weight: 700;
                font-display: swap;
                src: url("/fonts/space-grotesk-latin-700.woff2") format("woff2");
                unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
            }
            @font-face {
                font-family: "Inter";
                font-style: normal;
                font-weight: 400;
                font-display: swap;
                src: url("/fonts/inter-latin-400.woff2") format("woff2");
                unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
            }
            .font-display { font-family: var(--font-display); }
            .text-fg-bright { color: var(--color-fg-bright); }
            .text-accent { color: var(--color-accent); }
            .text-fg-dim { color: var(--color-fg-dim); }
            #root { min-height: 100vh; }
        </style>
    </head>
    <body>
        <div id="root"></div>
        <noscript>
            Nirvik Dhungana — Frontend Developer. This site requires JavaScript
            to display the full portfolio.
        </noscript>
        <!-- Main bundle — Vite injects type="module" automatically (deferred by default) -->
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
